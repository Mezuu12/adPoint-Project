<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Tombol Link</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #00ffcc;
            color: black;
            cursor: pointer;
        }

        button:hover {
            background: #00ccaa;
        }
    </style>
</head>
<body>

    <h1>Klik Tombol di Bawah</h1>

    <button onclick="goToLink()">Klik Aku</button>

    <script>
        function goToLink() {
            const links = [
                "https://omg10.com/4/10958837",
                "https://omg10.com/4/10958838",
                "https://omg10.com/4/10952510",
                "https://omg10.com/4/10958828",
                "https://omg10.com/4/10958836",
                "https://omg10.com/4/10958835"
            ];
            
            // Pilih link secara random
            const randomIndex = Math.floor(Math.random() * links.length);
            const selectedLink = links[randomIndex];
            
            // Arahkan ke link yang dipilih
            window.location.href = selectedLink;
        }
    </script>

</body>
</html>
